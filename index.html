<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>pila.</title>
<meta name="theme-color" content="#0d0d0d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0d0d0d;
  --surface: #141414;
  --off-white: #f5f0eb;
  --blush: #e8c4b8;
  --red: #ff3366;
  --muted: rgba(245,240,235,0.35);
  --very-muted: rgba(245,240,235,0.12);
}

html, body {
  background: var(--black);
  color: var(--off-white);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
}

button { cursor: pointer; font-family: 'Inter', sans-serif; border: none; outline: none; }

/* ── SCREEN ── */
.screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: max(52px, env(safe-area-inset-top)) 0 max(40px, env(safe-area-inset-bottom));
}

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  margin-bottom: 64px;
}

.wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--off-white);
}

.wordmark span {
  color: var(--red);
}

.top-tag {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── HERO ── */
.hero {
  padding: 0 24px;
  flex: 1;
}

.hero-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--blush);
  margin-bottom: 20px;
  opacity: 0.8;
}

.hero-headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  font-weight: 300;
  line-height: 0.95;
  color: var(--off-white);
  margin-bottom: 0;
  letter-spacing: -0.02em;
}

.hero-headline .line2 {
  display: block;
  font-style: italic;
  font-size: 86px;
  color: var(--red);
  /* intentionally overflows — the signature element */
  margin-left: -4px;
  white-space: nowrap;
}

.hero-body {
  margin-top: 36px;
  max-width: 260px;
}

.hero-body p {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.75;
  color: var(--muted);
  letter-spacing: 0.01em;
}

/* ── STATS STRIP ── */
.stats-strip {
  display: flex;
  gap: 0;
  margin: 48px 24px 0;
  border-top: 0.5px solid var(--very-muted);
  padding-top: 20px;
}

.stat {
  flex: 1;
  padding-right: 20px;
}

.stat:not(:last-child) {
  border-right: 0.5px solid var(--very-muted);
  margin-right: 20px;
}

.stat-n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 400;
  color: var(--off-white);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-l {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── CTA AREA ── */
.cta-area {
  padding: 40px 24px 0;
}

.cta-main {
  width: 100%;
  background: var(--off-white);
  color: var(--black);
  padding: 17px 24px;
  border-radius: 3px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.2s;
  margin-bottom: 12px;
}

.cta-main:active {
  background: var(--blush);
}

.cta-arrow {
  font-size: 18px;
  font-weight: 300;
}

.cta-sub {
  width: 100%;
  background: none;
  border: 0.5px solid var(--very-muted);
  color: var(--muted);
  padding: 17px 24px;
  border-radius: 3px;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.2s;
}

.cta-sub:active {
  border-color: rgba(245,240,235,0.3);
}

/* ── BOTTOM STRIP ── */
.bottom-strip {
  padding: 32px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.bottom-pills {
  display: flex;
  gap: 8px;
}

.bottom-pill {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  border: 0.5px solid var(--very-muted);
  border-radius: 2px;
  padding: 5px 10px;
  background: none;
  transition: border-color 0.2s, color 0.2s;
}

.bottom-pill:active {
  border-color: var(--blush);
  color: var(--blush);
}

.bottom-note {
  font-size: 10px;
  color: rgba(245,240,235,0.18);
  letter-spacing: 0.06em;
}

/* ── SUBTLE TEXTURE LINE ── */
.texture-line {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(232,196,184,0.3), transparent);
  pointer-events: none;
}
</style>
</head>
<body>

<div class="texture-line"></div>

<div class="screen">

  <!-- TOP -->
  <div class="top-bar">
    <div class="wordmark">pila<span>.</span></div>
    <div class="top-tag">Toronto</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">Pilates · Moments · Community</div>
    <h1 class="hero-headline">
      Every class<br>
      <span class="line2">is a moment.</span>
    </h1>
    <div class="hero-body">
      <p>Check into your studio. Capture the dual shot. Share your stats. Your Pilates story, told the way it deserves.</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat">
      <div class="stat-n">2.4k</div>
      <div class="stat-l">Members</div>
    </div>
    <div class="stat">
      <div class="stat-n">25</div>
      <div class="stat-l">Studios</div>
    </div>
    <div class="stat">
      <div class="stat-n">14k</div>
      <div class="stat-l">Moments</div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-area">
    <button class="cta-main">
      Start your moment
      <span class="cta-arrow">→</span>
    </button>
    <button class="cta-sub">
      I already have an account
      <span class="cta-arrow" style="font-size:14px">→</span>
    </button>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-strip">
    <div class="bottom-pills">
      <button class="bottom-pill">🔥 Streak</button>
      <button class="bottom-pill">👯 Friends</button>
      <button class="bottom-pill">✨ Wrapped</button>
    </div>
    <div class="bottom-note">Free to join</div>
  </div>

</div>

</body>
</html>
